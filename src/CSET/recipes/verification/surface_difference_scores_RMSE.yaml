category: Scores
title: "$METHOD $VARNAME\nScores RMSE between $OTHER_MODEL and $BASE_MODEL $SUBAREA_NAME"
description: |
  Extracts and plots the Root Mean Square Error in $METHOD of $VARNAME.
  The RMSE is calculated based on that used in the
  package [`scores`](https://scores.readthedocs.io/en/stable/api.html#scores.continuous.rmse).

  This recipe can preserve the time, latitude and longitude coordinates, in which case
  a sequence of spatial plots of the RMSE are produced according to the averaging
  method i.e. SEQ, MAX and MIN.

  Alternatively, the RMSE can be computed over all time points in the case study, i.e.
  preserving just the latitude and longitude coordinates, by selecting the method CASE.
  This will produce a single output plot of the total RMSE.

  A larger RMSE implies a greater error than a smaller RMSE. An
  RMSE of zero indicates the two fields match. The RMSE is calculated
  on the grid point and thus a spatial view of the RMSE provides useful
  information about where the differences are, or if placement errors
  are domininating the score (usually indicated by dipoles).

  For RMSE values computed across an entire casse study, the computation
  is done within the scores RMSE module, rather than trying to mean across
  each timestep. This preserves the nonlinear nature of the RMSE metric.

steps:
  - operator: read.read_cubes
    file_paths: $INPUT_PATHS
    model_names: [$BASE_MODEL, $OTHER_MODEL]
    constraint:
      operator: constraints.combine_constraints
      varname_constraint:
        operator: constraints.generate_var_constraint
        varname: $VARNAME
      cell_methods_constraint:
        operator: constraints.generate_cell_methods_constraint
        cell_methods: []
        varname: $VARNAME
      pressure_level_constraint:
        operator: constraints.generate_level_constraint
        coordinate: "pressure"
        levels: []
    subarea_type: $SUBAREA_TYPE
    subarea_extent: $SUBAREA_EXTENT

    # The preserved coordinates specifies whether or not the
    # RMSE is to be computed over the entire case study.
  - operator: scoreswrappers.scores_rmse
    preserved_coordinates: $PRESERVED_COORDS

    # This collapse is relevant only if the RMSE has not been
    # computed across the entire case study.
  - operator: collapse.collapse
    coordinate: ["time"]
    method: $METHOD

  - operator: plot.spatial_pcolormesh_plot

  - operator: write.write_cube_to_nc
    overwrite: True
