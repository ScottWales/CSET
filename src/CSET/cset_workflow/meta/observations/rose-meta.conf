################################################################################
# Observations
################################################################################

[ns=Observations]
sort-key=sec-d
title=Observations

################################################################
# Surface point-based observations.
[ns=Observations/Point]
sort-key=sec-d2
title=Point-based observations

[template variables=POINT_OBS]
ns=Observations/Point
description=Compare with point-based observations.
            SELECT_SUBAREA options can be used to define regions of interest.
            Variables to plot are set by POINT_OBS_FIELDS list.
type=python_boolean
compulsory=true
sort-key=0point1a
trigger=template variables=POINT_OBS_TYPES: True;
	template variables=POINT_OBS_USE_WMO_STATION_NUMBERS: True;
	template variables=POINT_OBS_WMO_BLOCK_STTN_NUMBERS: True;
	template variables=POINT_OBS_SYNOP_INTERVAL: True;
	template variables=POINT_OBS_SYNOP_OFFSET: True;
	template variables=POINT_OBS_FIELDS: True;
	template variables=POINT_OBS_FIELD_METHOD: True;
	template variables=POINT_OBS_SPATIAL: True;
	template variables=POINT_OBS_MODEL_SPATIAL: True;
	template variables=POINT_OBS_MODEL_DIFFERENCE: True;


[template variables=POINT_OBS_TYPES]
ns=Observations/Point
title=MetDB observation types
description=List of Met Office MetDB observation database Datatype(s) to fetch and compare against.
help=Select all required Datatypes. See http://www-mdb-apps/ssot/datatypes/index.html for details (Met Office).
compulsory=true
type=python_list
sort-key=0point1b

[template variables=POINT_OBS_USE_WMO_STATION_NUMBERS]
ns=Observations/Point
title=Select observations by WMO station numbers
description=Choose WMO block or station numbers to select point observations.
            If False (default), use any SELECT_SUBAREA settings to define region of interest.
            See 'Cycling and Models' panel for details.
help=Select to set stations by WMO station or block number.
compulsory=true
type=python_boolean
sort-key=0point1c
trigger=template variables=POINT_OBS_WMO_BLOCK_STTN_NUMBERS: True;

[template variables=POINT_OBS_WMO_BLOCK_STTN_NUMBERS]
ns=Observations/Point
title=WMO Block or Station numbers to be selected.
description=List of WMO block numbers (2 digits) or station numbers (5 digits).
help=WMO block numbers (2 digits) or station numbers (5 digits).
compulsory=true
type=python_list
sort-key=0point1d

[template variables=POINT_OBS_SYNOP_INTERVAL]
ns=Observations/Point
title=Time interval between observations
description=Output frequency of required observation data, e.g. PT1H
help=The period of the input observation data retrieval as an ISO 8601 duration.
    This is used to fetch point observations at regular validity times.
    For example: PT48H or P7D
compulsory=true
type=quoted
sort-key=0point1e

[template variables=POINT_OBS_SYNOP_OFFSET]
ns=Observations/Point
title=Offset from cycle initiation to validity time for synoptic observations, e.g. PT1H
description=Offset from forecast initiation to verification start, e.g. PT1H
help=The offset in time between the workflow cycle initiation and the start of the
    observation retrieval period (i.e. the first validity time) as an ISO 8601 duration.
    For example: PT48H or P7D

    This is useful when required fields are not output on the first time step;
    In general, assume to retrieve observations from initial time and set to PT0H, meaning no offset.
compulsory=true
type=quoted
sort-key=0point1f

[template variables=POINT_OBS_FIELDS]
ns=Observations/Point
title=Diagnostic variables
description=Surface (2D) diagnostic variables to compare with point observations.
help=Quoted variable names for surface (2D) variables. The names should follow CF naming
    conventions, and will be translated appropriately. Where applicable, a STASH code in
    the format "m??s??i???" may be be used instead.
    Note same format required as for SURFACE_FIELDS input.
    Only list variables for which observations are available.
compulsory=true
type=python_list
sort-key=0point2

[template variables=POINT_OBS_FIELD_METHOD]
ns=Observations/Point
description=Select analysis method(s) for output mapped plots. Add all options required.
            Leave as "" or set to "SEQ" (sequence) for plots each diagnostic output time.
            For time-collapsed outputs over each analysis period, set to "MEAN", "MAX", "MIN", "STD_DEV" etc.
help=Quoted analysis methods. Settings should be based on available iris.analysis methods for collapsing cube dimensions.
type=python_list
compulsory=true
sort-key=0point3

[template variables=POINT_OBS_SPATIAL]
ns=Observations/Point
description=Create spatially mapped plots of selected point observations.
            Variables to plot are set by POINT_OBS_FIELDS variable list.
	    Analysis method(s) are set by POINT_OBS_FIELD_METHOD.
type=python_boolean
compulsory=true
sort-key=0point4

[template variables=POINT_OBS_MODEL_SPATIAL]
ns=Observations/Point
description=Create spatially mapped plots for specified surface fields with
            point observations overplotted.
	        Variables to plot are set by POINT_OBS_FIELDS variable list.
	        Analysis method(s) are set by POINT_OBS_FIELD_METHOD.
type=python_boolean
compulsory=true
sort-key=0point5

[template variables=POINT_OBS_MODEL_DIFFERENCE]
ns=Observations/Point
description=Create spatially mapped difference plots for specified surface fields.
            Variables to plot are set by POINT_OBS_FIELDS variable list.
	        Analysis method(s) are set by POINT_OBS_FIELD_METHOD.
type=python_boolean
compulsory=true
sort-key=0point6

################################################################

[ns=Observations/Radar]
sort-key=sec-e2
title=Radar observations

# Surface Nimrod radar rainfall fields.
[template variables=NIMROD_RADAR_OBS]
ns=Observations/Radar
description=Use UK Nimrod radar observations
type=python_boolean
compulsory=true
sort-key=nimrod-radar-1
trigger=template variables=NIMROD_COMP_XKM: True;
        template variables=NIMROD_COMP_1KM: True;
        template variables=NIMROD_COMP_2KM: True;
        template variables=NIMROD_WEIGHTS: True;
        template variables=NIMROD_COMP_5MIN: True;

[template variables=NIMROD_COMP_XKM]
ns=Observations/Radar
title=UK Nimrod radar accumulated rainfall
description=Default UK Nimrod rainfall accumulation
help=Switch to select default gridded UK Nimrod rainfall accumulation.
compulsory=true
type=python_boolean
sort-key=nimrod-radar-3

[template variables=NIMROD_COMP_1KM]
ns=Observations/Radar
title=UK Nimrod radar accumulated rainfall 1km gridding
description=1km gridded UK Nimrod rainfall accumulation
help=Switch to select 1km gridded UK Nimrod rainfall accumulation.
compulsory=true
type=python_boolean
sort-key=nimrod-radar-4

[template variables=NIMROD_COMP_2KM]
ns=Observations/Radar
title=UK Nimrod radar accumulated rainfall 2km gridding
description=2km gridded UK Nimrod rainfall accumulation
help=Switch to select 2km gridded UK Nimrod rainfall accumulation.
compulsory=true
type=python_boolean
sort-key=nimrod-radar-5

[template variables=NIMROD_WEIGHTS]
ns=Observations/Radar
title=UK Nimrod radar accumulated rainfall weights
description=Weight fields associated with computing hourly accumulated rainfall
help=Switch to retrieve the weight fields associated with the hourly Nimrod
     rainfall accumulation fields.
     The weights record how many 5 minute rainfall rate observations were
     used to compute each hourly accumulation. The weights are in the range [0,13].
compulsory=true
type=python_boolean
sort-key=nimrod-radar-6

[template variables=NIMROD_COMP_5MIN]
ns=Observations/Radar
title=UK Nimrod radar 5 minute rainfall rate
description=Gridded UK Nimrod 5 minute rainfall rate
help=Switch to select gridded UK Nimrod 5 minute rainfall rate.
compulsory=true
type=python_boolean
sort-key=nimrod-radar-7

